name: Build & release local module exe

# Push a version tag (e.g. v0.2.0) to build the Windows exe and attach it to
# that tag's GitHub Release automatically. Manual runs just produce an artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies + PyInstaller
        working-directory: local-module
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        working-directory: local-module
        run: >-
          python -m PyInstaller --noconfirm --clean --onefile --console
          --name LocalBGModule
          --collect-all rembg --collect-all onnxruntime --collect-all pymatting
          --collect-all numba --collect-all llvmlite
          --copy-metadata onnxruntime --copy-metadata rembg
          --copy-metadata tqdm --copy-metadata numpy
          app_entry.py

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: LocalBGModule-exe
          path: local-module/dist/LocalBGModule.exe

      - name: Attach exe to the tag's Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: local-module/dist/LocalBGModule.exe
